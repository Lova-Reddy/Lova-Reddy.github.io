<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel = "stylesheet" href = "indsty.css">
    <link rel = "icon" href = "calculator.png" > 

</head>

<body>
    <div class = "bg"><div class = "bg-img"></div></div>
    <div><h1 class = "head-cont">Calculator</h1></div>
    <div class = "cal">
        
        <div class =  "screen">
            <input id = "runner" class = "display" type = "text" placeholder = "" readonly>
        </div>

        <div class = "btn">
            
            <button onclick = "appendValue('**')" class = "gb-button"> ^ </button>
            <button onclick = "appendvalue('%')"> % </button>
            <button onclick = "appendValue('/')"> / </button>
            <button onclick = "appendValue('+')"> + </button>
            <button onclick = "appendValue('9')"> 9 </button>            
            <button onclick = "appendValue('8')"> 8 </button>
            <button onclick = "appendValue('7')"> 7 </button>
            <button onclick = "appendValue('-')"> - </button>
            <button onclick = "appendValue('6')"> 6 </button>
            <button onclick = "appendValue('5')"> 5 </button>
            <button onclick = "appendValue('4')"> 4 </button>
            <button onclick = "appendValue('*')"> * </button>
            <button onclick = "appendValue('3')"> 3 </button>
            <button onclick = "appendValue('2')"> 2 </button>
            <button onclick = "appendValue('1')"> 1 </button>
            <button onclick = "flush()"> AC </button>
            <button onclick = "appendValue('0')"> 0 </button>
            <button onclick = "appendValue('.')"> . </button>
            <button onclick = "compute()"><center> = </center> </button>
            <button onclick = "del()"> Del </button>

        </div>
        
    </div>
    <script src = "inscript.js"></script>
</body>

</html>
